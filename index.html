<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pick a topic. The AI asks questions. You answer out loud. Get real-time feedback with ratings."
    />

    <link rel="canonical" href="https://voice-round.vercel.app/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VoiceRound" />
    <meta
      property="og:title"
      content="VoiceRound: Practice real interviews with an AI interviewer by talking"
    />
    <meta
      property="og:description"
      content="Pick a topic. The AI asks questions. You answer out loud. Get real-time feedback with ratings."
    />
    <meta property="og:url" content="https://voice-round.vercel.app/" />
    <meta property="og:image" content="https://voice-round.vercel.app/home.png" />
    <meta property="og:image:width" content="2370" />
    <meta property="og:image:height" content="1578" />
    <meta property="og:image:alt" content="VoiceRound app interface" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="VoiceRound: Practice real interviews with an AI interviewer by talking"
    />
    <meta
      name="twitter:description"
      content="Pick a topic. The AI asks questions. You answer out loud. Get real-time feedback with ratings."
    />
    <meta name="twitter:image" content="https://voice-round.vercel.app/home.png" />
    <!-- PWA: theme color. Single value because the app has no dark mode
         today, so dual light/dark values would be identical. Add a
         dark variant if a dark theme ever ships.
         The <link rel="manifest"> is injected by vite-plugin-pwa at build
         time; the manifest itself is configured in vite.config.ts. -->
    <meta name="theme-color" content="#fffdf5" />

    <!-- PWA: standalone hints. Ship both the standard name and the
         Apple-prefixed one. iOS Safari hasn't migrated to the standard
         name and dropping the Apple form breaks iOS standalone. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="VoiceRound" />
    <!-- "default": white status bar background, dark icons. The
         alternative "black-translucent" overlays content behind the
         status bar and forces layout work this app doesn't budget for. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>VoiceRound</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
